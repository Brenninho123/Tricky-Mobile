name: Android Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Haxelibs
        run: |
          haxelib setup /home/runner/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui --quiet
          haxelib install hscript --quiet
          haxelib install actuate --quiet
          haxelib install newgrounds --quiet
          haxelib install polymod --quiet
          haxelib run lime setup lime -y

      - name: Setup Lime Android
        run: printf 'y\n' | haxelib run lime setup android

      - name: Build Android
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: haxelib run lime build android -release -verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VsTricky-android
          path: export/release/android/bin/app/build/outputs/apk/**/*.apk
